name: Verificar links

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --max-retries 2
            --accept 200,403,429,999
            './**/*.html'
            './**/*.md'
            './**/*.xml'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validar HTML principal
        run: npx --yes html-validate index.html 404.html
