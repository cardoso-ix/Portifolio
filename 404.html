<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Página não encontrada | Eduardo Cardoso</title>
  <link rel="icon" href="favicon.ico">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a1020;
      --text: #f4f8ff;
      --muted: #9eb0cc;
      --accent: #2ddcff;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, rgba(45, 220, 255, 0.12), transparent 55%), var(--bg);
      color: var(--text);
      text-align: center;
    }
    h1 { font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 0.75rem; }
    p { color: var(--muted); max-width: 28rem; line-height: 1.6; margin-bottom: 1.5rem; }
    a {
      display: inline-block;
      padding: 0.75rem 1.25rem;
      border-radius: 999px;
      border: 1px solid rgba(45, 220, 255, 0.35);
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { background: rgba(45, 220, 255, 0.08); }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>Esta página não existe ou foi movida. Volte ao portfólio para continuar navegando.</p>
    <a href="./">Ir para o portfólio</a>
  </main>
</body>
</html>
